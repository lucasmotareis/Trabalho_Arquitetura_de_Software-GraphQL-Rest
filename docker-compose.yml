services:
  core-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: coredb
      POSTGRES_USER: core_user
      POSTGRES_PASSWORD: core_pass
    volumes:
      - core_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_pass
    volumes:
      - order_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventorydb
      POSTGRES_USER: inventory_user
      POSTGRES_PASSWORD: inventory_pass
    volumes:
      - inventory_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    depends_on:
      inventory-db:
        condition: service_healthy
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      APP_SEED_ENABLED: "true"
      SERVER_PORT: 8084
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://inventory-db:5432/inventorydb
      SPRING_DATASOURCE_USERNAME: inventory_user
      SPRING_DATASOURCE_PASSWORD: inventory_pass
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8084:8084"

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    depends_on:
      order-db:
        condition: service_healthy
      inventory-service:
        condition: service_started
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      APP_SEED_ENABLED: "true"
      INVENTORY_SERVICE_URL: http://inventory-service:8084/api
      SERVER_PORT: 8083
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orderdb
      SPRING_DATASOURCE_USERNAME: order_user
      SPRING_DATASOURCE_PASSWORD: order_pass
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8083:8083"

  backend-rest:
    build:
      context: .
      dockerfile: backend-rest/Dockerfile
    depends_on:
      core-db:
        condition: service_healthy
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      APP_SEED_ENABLED: "true"
      INVENTORY_SERVICE_URL: http://inventory-service:8084/api
      ORDER_SERVICE_URL: http://order-service:8083/api
      SERVER_PORT: 8081
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://core-db:5432/coredb
      SPRING_DATASOURCE_USERNAME: core_user
      SPRING_DATASOURCE_PASSWORD: core_pass
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8081:8081"

  backend-graphql:
    build:
      context: .
      dockerfile: backend-graphql/Dockerfile
    depends_on:
      core-db:
        condition: service_healthy
      backend-rest:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      APP_SEED_ENABLED: "false"
      INVENTORY_SERVICE_URL: http://inventory-service:8084/api
      ORDER_SERVICE_URL: http://order-service:8083/api
      SERVER_PORT: 8082
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_DATASOURCE_URL: jdbc:postgresql://core-db:5432/coredb
      SPRING_DATASOURCE_USERNAME: core_user
      SPRING_DATASOURCE_PASSWORD: core_pass
      SPRING_GRAPHQL_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SPRING_GRAPHQL_GRAPHIQL_ENABLED: "true"
      SPRING_H2_CONSOLE_ENABLED: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8082:8082"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_REST_API_URL: ${VITE_REST_API_URL:-http://localhost:8081/api}
        VITE_GRAPHQL_API_URL: ${VITE_GRAPHQL_API_URL:-http://localhost:8082/graphql}
    depends_on:
      - backend-rest
      - backend-graphql
    environment:
      VITE_REST_API_URL: ${VITE_REST_API_URL:-http://localhost:8081/api}
      VITE_GRAPHQL_API_URL: ${VITE_GRAPHQL_API_URL:-http://localhost:8082/graphql}
    ports:
      - "5173:80"

volumes:
  core_db_data:
  order_db_data:
  inventory_db_data:
